# Project:      Inazuma AI Ecosystem
# File:         nginx.conf
# Description:  全局 Nginx 反向代理与路由配置文件。
#               负责统一监听公网入口，将大模型 API 流量路由至底层业务网关，
#               同时代理前端管理面板，并提供基础的访问权限隔离与通信协议支持。
# ==============================================================================

events {
    # 设置单个工作进程允许挂载的最大并发连接数
    worker_connections 1024;
}

http {
    # 引入标准 MIME 类型映射表
    include       mime.types;
    # 对于未匹配到的文件类型，默认使用二进制流格式传输
    default_type  application/octet-stream;

    server {
        # 统一监听 80 端口，作为系统的 HTTP 公网入口
        listen 80;
        server_name _; 

        # =========================================================================
        # 模型推理接口路由配置 (免认证层)
        # =========================================================================
        # 将外部大模型 API 调用请求转发至内部鉴权计费服务 (8081端口)
        location /v1/ {
            proxy_pass http://127.0.0.1:8081;
            
            # 透传客户端网络上下文特征
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            # Server-Sent Events (SSE) 长连接配置
            # 强制使用 HTTP/1.1 并清空 Connection 头以维持协议状态
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            
            # 禁用 Nginx 分块编码干预与接收缓冲区，确保文本字符流实现零延迟透传
            chunked_transfer_encoding off;
            proxy_buffering off;
            proxy_cache off;
            
            # 放宽网络读超时限制，以适配大模型的推理耗时
            proxy_read_timeout 120s;
        }

        # =========================================================================
        # 鉴权业务接口路由配置 (免认证层)
        # =========================================================================
        # 将系统基础账号的注册、登录请求转发至内部业务服务
        location /api/ {
            proxy_pass http://127.0.0.1:8081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # =========================================================================
        # 内部管理控制台路由配置 (隔离层)
        # =========================================================================
        # 代理监控与管控前端后台 (Streamlit, 8501端口)
        location / {
            # 实施 HTTP Basic Auth 隔离防护，拦截未经授权的后台访问请求
            auth_basic "Inazuma System - Restricted Area";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://127.0.0.1:8501;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            # WebSocket 协议升级配置
            # Streamlit 组件强依赖 WebSocket 维持前后端的状态同步
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # 设置 WebSocket 隧道的超时阈值为 24 小时，防止 TCP 链接因空闲被主动回收
            proxy_read_timeout 86400;
        }
    }
}