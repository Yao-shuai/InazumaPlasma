# Project:      Inazuma AI Ecosystem
# File:         nginx.conf (Server Block snippet)
# Description:  网关入口反向代理配置文件。
#               负责唯一的公网端口监听、非法路由拦截、真实 IP 与上下文透传，
#               以及 Server-Sent Events (SSE) 长连接传输状态保障。
# ==============================================================================

server {
    # --------------------------------------------------------------------------
    # 1. 基础网络监听与域名绑定 (Core Networking)
    # --------------------------------------------------------------------------
    # 监听 80 端口，作为整个生态系统唯一的公网出入口 
    # (生产环境建议后续配置 SSL 证书，升级为 listen 443 ssl http2;)
    listen 80;
    server_name _; 

    # 规范化：设置默认字符集，避免后端返回异常信息时出现乱码
    charset utf-8;

    # --------------------------------------------------------------------------
    # 2. 基础安全加固 (Security Hardening)
    # --------------------------------------------------------------------------
    # 隐藏 Nginx 版本号，避免被自动化脚本利用特定版本的漏洞进行攻击
    server_tokens off;

    # --------------------------------------------------------------------------
    # 3. 大模型标准接口转发 (LLM API Routing & SSE Optimization)
    # --------------------------------------------------------------------------
    # 🚀 规范化 4：标准请求全量转发至 8081 (鉴权计费网关)
    location /v1/chat/completions {
        proxy_pass http://127.0.0.1:8081;
        
        # 【关键】透传客户端真实网络上下文给底层 InazumaAIGateway，用于限流和风控
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ----------------------------------------------------------------------
        # ⚠️ Server-Sent Events (SSE) 流式输出极致保障配置
        # ----------------------------------------------------------------------
        # 强制使用 HTTP/1.1，防止 HTTP/1.0 默认的短连接导致生成一半被截断
        proxy_http_version 1.1;
        # 清空 Connection 头，配合后端维持 Keep-Alive
        proxy_set_header Connection '';
        
        # 彻底关闭分块编码干预和缓冲，确保后端引擎吐出的每一个 Token (字符) 
        # 都能在 0 延迟下穿透 Nginx 抵达客户端侧的 UI
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        
        # 运维警告：大模型深思/长文本生成耗时较长。
        # 此处读写超时设定为 120s，若未来接入 DeepSeek-R1 等超长思考模型，需酌情延长至 300s+
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # --------------------------------------------------------------------------
    # 4. 业务 API 转发 (Business API Routing)
    # --------------------------------------------------------------------------
    # 注册/登录、用户中心等 API 转发 -> 打给 8081 业务层
    location /api/ {
        proxy_pass http://127.0.0.1:8081;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 普通业务接口响应应在毫秒级，配置标准 60s 超时即可防止僵尸连接挂起
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
    
    # --------------------------------------------------------------------------
    # 5. 【安全防线】默认兜底与非法路由拦截 (Default Deny)
    # --------------------------------------------------------------------------
    # 架构设计原则：白名单机制。外部请求除了命中上述 /v1/ 和 /api/ 外，
    # 任何试图直接访问根目录 (/) 或探测底层端口 (如 8080 引擎层) 的请求，统统丢弃。
    location / {
        # 直接返回 404，不暴露任何有效服务状态，防止黑客扫描后台目录
        return 404; 
    }
}